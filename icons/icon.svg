<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="32" fill="url(#grad)" />
  
  <!-- Outer glowing camera loop -->
  <circle cx="64" cy="64" r="30" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9" />
  
  <!-- Outer shutter notch -->
  <path d="M 64 24 L 64 34 M 64 94 L 64 104 M 24 64 L 34 64 M 94 64 L 104 64" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7" />
  
  <!-- Recording indicator dot -->
  <circle cx="64" cy="64" r="14" fill="#ef4444" filter="url(#glow)" />
</svg>
